<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Lampa Admin</title><style>
body{margin:0;background:#0b0d10;color:#fff;font:15px/1.45 system-ui}main{max-width:1180px;margin:auto;padding:32px}section{background:#171a1f;border:1px solid #2b3038;border-radius:18px;padding:20px;margin:18px 0}input,button{background:#0d0f12;border:1px solid #343a44;color:#fff;border-radius:10px;padding:11px;font:inherit}button{cursor:pointer}.danger{background:#3b1d22;color:#ffb8bd}.row{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:12px;padding:12px 0;border-top:1px solid #2b3038}.actions{display:flex;gap:7px;flex-wrap:wrap;justify-content:flex-end}.muted{color:#9299a5}pre{white-space:pre-wrap;overflow:auto;max-height:420px}.grid{display:grid;grid-template-columns:1fr 2fr auto;gap:8px}@media(max-width:700px){.grid,.row{grid-template-columns:1fr}.actions{justify-content:flex-start}}</style></head><body><main><h1>SelfHosted Admin</h1><p><a href="/account/" style="color:#fff">← Аккаунт</a></p>
<section><h2>Пользователи</h2><input id="q" placeholder="Email или ник"><button id="search">Найти</button><div id="users"></div></section>
<section><h2>Сессии</h2><div id="sessions"></div></section>
<section><h2>Каталог и blacklist плагинов</h2><div class="grid"><input id="pname" placeholder="Название"><input id="purl" placeholder="https://..."><button id="save">Добавить</button></div><div id="plugin-msg" class="muted"></div><div id="plugins"></div></section>
<section><h2>Аудит</h2><pre id="audit"></pre></section></main><script>
let csrf='';const h={'Content-Type':'application/json'},$=s=>document.querySelector(s);async function api(p,o={}){o.credentials='same-origin';o.headers=Object.assign({},h,o.headers||{});if(csrf)o.headers['X-CSRF-Token']=csrf;const r=await fetch(p,o);let j={};try{j=await r.json()}catch(e){}if(!r.ok)throw Error(j.message||'Ошибка');return j.data}
function button(title,action,danger=false){const b=document.createElement('button');b.textContent=title;if(danger)b.className='danger';b.onclick=action;return b}
async function userAction(id,action){await api('/api/v1/admin/users/'+id,{method:'PATCH',body:JSON.stringify({action})});await users();await sessions()}
async function users(){const rows=await api('/api/v1/admin/users?q='+encodeURIComponent($('#q').value));const box=$('#users');box.textContent='';rows.forEach(x=>{const r=document.createElement('div');r.className='row';const t=document.createElement('div');t.textContent=x.nickname+' · '+x.email+' · '+x.role+' · '+x.status;const a=document.createElement('div');a.className='actions';a.append(button('Reset-код',async()=>{const d=await api('/api/v1/admin/users/'+x.id+'/reset-token',{method:'POST'});prompt('Одноразовый код на 15 минут',d.token)}));if(x.status==='active')a.append(button('Блокировать',()=>userAction(x.id,'block'),true));else a.append(button('Разблокировать',()=>userAction(x.id,'unblock')));a.append(button('Удалить через 30 дней',()=>confirm('Запланировать удаление?')&&userAction(x.id,'delete'),true));r.append(t,a);box.append(r)})}
async function sessions(){const rows=await api('/api/v1/admin/sessions');const box=$('#sessions');box.textContent='';rows.filter(x=>!x.revokedAt).forEach(x=>{const r=document.createElement('div');r.className='row';const t=document.createElement('div');t.textContent=x.deviceName+' · '+x.ip+' · user '+x.userId;const a=document.createElement('div');a.className='actions';a.append(button('Отозвать',async()=>{await api('/api/v1/admin/sessions/'+x.id,{method:'DELETE'});sessions()},true));r.append(t,a);box.append(r)})}
async function plugins(){const rows=await api('/api/v1/admin/plugins');const box=$('#plugins');box.textContent='';rows.forEach(x=>{const r=document.createElement('div');r.className='row';const t=document.createElement('div');t.textContent=x.name+' · '+x.url+' · '+x.verificationStatus+(x.blacklisted?' · BLACKLIST':'');const a=document.createElement('div');a.className='actions';a.append(button(x.blacklisted?'Убрать из blacklist':'В blacklist',async()=>{x.blacklisted=!x.blacklisted;await api('/api/v1/admin/plugins',{method:'POST',body:JSON.stringify(x)});plugins()},!x.blacklisted));a.append(button(x.enabled?'Отключить':'Включить',async()=>{x.enabled=!x.enabled;await api('/api/v1/admin/plugins',{method:'POST',body:JSON.stringify(x)});plugins()}));r.append(t,a);box.append(r)})}
async function audit(){$('#audit').textContent=JSON.stringify(await api('/api/v1/admin/audit'),null,2)}
async function load(){const me=await api('/api/v1/auth/me');csrf=me.csrfToken;if(me.user.role!=='admin')throw Error('Нет прав');await Promise.all([users(),sessions(),plugins(),audit()])}
$('#search').onclick=users;$('#save').onclick=async()=>{try{const d=await api('/api/v1/admin/plugins',{method:'POST',body:JSON.stringify({name:$('#pname').value,url:$('#purl').value,enabled:true})});$('#plugin-msg').textContent='Сохранено: '+d.name;await plugins()}catch(e){$('#plugin-msg').textContent=e.message}};load().catch(e=>{document.body.textContent=e.message;setTimeout(()=>location.replace('/account/?gate=1'),1200)});
</script></body></html>
