<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Lampa Admin</title><style>
body{margin:0;background:#0b0d10;color:#fff;font:15px system-ui}main{max-width:1100px;margin:auto;padding:32px}section{background:#171a1f;border:1px solid #2b3038;border-radius:18px;padding:20px;margin:18px 0}input,button{background:#0d0f12;border:1px solid #343a44;color:#fff;border-radius:10px;padding:11px;font:inherit}button{cursor:pointer}.row{display:grid;grid-template-columns:1fr auto;gap:12px;padding:12px 0;border-top:1px solid #2b3038}.muted{color:#9299a5}pre{white-space:pre-wrap;overflow:auto}</style></head><body><main><h1>SelfHosted Admin</h1><p><a href="/account/" style="color:#fff">← Аккаунт</a></p>
<section><h2>Пользователи</h2><input id="q" placeholder="Email или ник"><button id="search">Найти</button><div id="users"></div></section>
<section><h2>Добавить плагин</h2><input id="pname" placeholder="Название"><input id="purl" placeholder="https://..."><button id="save">Добавить</button><div id="plugin-msg" class="muted"></div></section>
<section><h2>Аудит</h2><pre id="audit"></pre></section></main><script>
let csrf='';const h={'Content-Type':'application/json'};async function api(p,o={}){o.credentials='same-origin';o.headers=Object.assign({},h,o.headers||{});if(csrf)o.headers['X-CSRF-Token']=csrf;const r=await fetch(p,o),j=await r.json();if(!r.ok)throw Error(j.message||'Ошибка');return j.data}
async function users(){const rows=await api('/api/v1/admin/users?q='+encodeURIComponent(document.querySelector('#q').value));const box=document.querySelector('#users');box.textContent='';rows.forEach(x=>{const r=document.createElement('div');r.className='row';const t=document.createElement('div');t.textContent=x.nickname+' · '+x.email+' · '+x.status;const b=document.createElement('button');b.textContent='Reset-код';b.onclick=async()=>{const d=await api('/api/v1/admin/users/'+x.id+'/reset-token',{method:'POST'});prompt('Одноразовый код на 15 минут',d.token)};r.append(t,b);box.append(r)})}
async function load(){const me=await api('/api/v1/auth/me');csrf=me.csrfToken;if(me.user.role!=='admin')throw Error('Нет прав');await users();document.querySelector('#audit').textContent=JSON.stringify(await api('/api/v1/admin/audit'),null,2)}
document.querySelector('#search').onclick=users;document.querySelector('#save').onclick=async()=>{const d=await api('/api/v1/admin/plugins',{method:'POST',body:JSON.stringify({name:document.querySelector('#pname').value,url:document.querySelector('#purl').value,enabled:true})});document.querySelector('#plugin-msg').textContent='Сохранено: '+d.name};load().catch(e=>document.body.textContent=e.message);
</script></body></html>
