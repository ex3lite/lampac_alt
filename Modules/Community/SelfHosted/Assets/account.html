<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Lampa — аккаунт</title>
  <style>
    :root{color-scheme:dark;--bg:#0b0d10;--card:#15181d;--muted:#9299a5;--line:#292e36;--accent:#f4f5f7;--danger:#ff6b6b}*{box-sizing:border-box}
    body{margin:0;background:radial-gradient(circle at 20% 0,#20242b 0,var(--bg) 42%);color:#fff;font:16px/1.45 system-ui,-apple-system,Segoe UI,sans-serif;min-height:100vh}
    main{width:min(920px,100%);margin:auto;padding:clamp(22px,5vw,64px)}h1{font-size:clamp(34px,7vw,68px);line-height:1;margin:0 0 12px}p{color:var(--muted)}
    .card{background:rgba(21,24,29,.94);border:1px solid var(--line);border-radius:24px;padding:clamp(20px,4vw,36px);box-shadow:0 24px 80px #0008}.grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}.full{grid-column:1/-1}
    label{display:grid;gap:7px;color:#cbd0d8;font-size:14px}input{width:100%;border:1px solid var(--line);background:#0d0f13;color:#fff;border-radius:14px;padding:14px 16px;font:inherit;outline:none}input:focus{border-color:#747e8d}
    button,a.button{border:0;border-radius:14px;padding:14px 18px;background:var(--accent);color:#0b0d10;font-weight:750;font:inherit;cursor:pointer;text-decoration:none;display:inline-flex;justify-content:center}.secondary{background:#272c34!important;color:#fff!important}.danger{background:#3b1d22!important;color:#ffb8bd!important}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:20px}.hidden{display:none!important}.notice{padding:12px 14px;border-radius:12px;background:#242932;margin:14px 0}.error{background:#3a1b20;color:#ffb6bc}.session{padding:14px 0;border-top:1px solid var(--line);display:flex;justify-content:space-between;gap:16px}.session small{color:var(--muted)}
    @media(max-width:650px){.grid{grid-template-columns:1fr}.full{grid-column:auto}.card{border-radius:18px}}
  </style>
</head>
<body><main><h1>Аккаунт Lampa</h1><p>Один вход для телевизора, телефона и браузера.</p>
  <section id="auth" class="card">
    <div id="message" class="notice hidden"></div>
    <div class="grid">
      <label class="full">Email<input id="email" type="email" autocomplete="email" maxlength="254"></label>
      <label id="nick-row">Публичный ник<input id="nickname" autocomplete="nickname" maxlength="40"></label>
      <label>Пароль<input id="password" type="password" autocomplete="current-password" minlength="12" maxlength="128"></label>
    </div>
    <div class="actions"><button id="login">Войти</button><button id="register" class="secondary">Зарегистрироваться</button></div>
    <details><summary>Есть одноразовый reset-код</summary><label>Reset-код<input id="reset-code" autocomplete="one-time-code"></label><button id="reset" class="secondary">Установить введённый пароль</button></details>
  </section>
  <section id="profile" class="card hidden">
    <h2 id="who"></h2><p id="email-view"></p><div id="pair-result" class="notice hidden"></div>
    <div class="actions"><a class="button secondary" href="/">Открыть Lampa</a><a id="admin-link" class="button secondary hidden" href="/account/admin/">Админка</a><button id="logout" class="danger">Выйти</button><button id="logout-all" class="danger">Выйти везде</button></div>
    <h3>Устройства</h3><div id="sessions"></div>
  </section>
  <footer><p><a href="https://www.themoviedb.org" style="color:#71d5a8;font-weight:800;text-decoration:none">TMDB</a> · This product uses the TMDB API but is not endorsed or certified by TMDB.</p></footer>
</main>
<script>
const PAIR_SECRET="__PAIR_SECRET__";let csrf='';const $=s=>document.querySelector(s);
async function api(path,options={}){options.credentials='same-origin';options.headers=Object.assign({'Content-Type':'application/json'},options.headers||{});if(csrf)options.headers['X-CSRF-Token']=csrf;const r=await fetch(path,options);let j={};try{j=await r.json()}catch(e){}if(!r.ok)throw new Error(j.message||'Ошибка запроса');return j.data}
function msg(text,error=false){const e=$('#message');e.textContent=text;e.className='notice'+(error?' error':'')}
async function claim(){if(!PAIR_SECRET)return;const d=await api('/api/v1/auth/pairings/claim',{method:'POST',body:JSON.stringify({claimSecret:PAIR_SECRET})});$('#pair-result').textContent='Устройство «'+d.deviceName+'» авторизовано.';$('#pair-result').classList.remove('hidden')}
async function show(user){$('#auth').classList.add('hidden');$('#profile').classList.remove('hidden');$('#who').textContent=user.nickname;$('#email-view').textContent=user.email;if(user.role==='admin')$('#admin-link').classList.remove('hidden');await claim();await sessions()}
async function sessions(){const rows=await api('/api/v1/account/sessions');const box=$('#sessions');box.textContent='';rows.forEach(x=>{const row=document.createElement('div');row.className='session';const info=document.createElement('div');info.textContent=x.deviceName+(x.current?' · это устройство':'');const sub=document.createElement('small');sub.textContent='Последняя активность: '+new Date(x.lastSeenAt).toLocaleString();info.appendChild(document.createElement('br'));info.appendChild(sub);row.appendChild(info);const actions=document.createElement('div');const rename=document.createElement('button');rename.className='secondary';rename.textContent='Переименовать';rename.onclick=async()=>{const name=prompt('Название устройства',x.deviceName);if(name){await api('/api/v1/account/sessions/'+x.id,{method:'PATCH',body:JSON.stringify({deviceName:name})});sessions()}};actions.appendChild(rename);if(!x.current){const b=document.createElement('button');b.className='secondary';b.textContent='Отключить';b.onclick=async()=>{await api('/api/v1/account/sessions/'+x.id,{method:'DELETE'});sessions()};actions.appendChild(b)}row.appendChild(actions);box.appendChild(row)})}
async function authenticate(kind){try{const payload={email:$('#email').value,password:$('#password').value,deviceName:navigator.userAgent.slice(0,80)};if(kind==='register')payload.nickname=$('#nickname').value;const d=await api('/api/v1/auth/'+kind,{method:'POST',body:JSON.stringify(payload)});csrf=d.csrfToken;await show(d.user)}catch(e){msg(e.message,true)}}
$('#login').onclick=()=>authenticate('login');$('#register').onclick=()=>authenticate('register');$('#logout').onclick=async()=>{await api('/api/v1/auth/logout',{method:'POST'});location.reload()};
$('#logout-all').onclick=async()=>{await api('/api/v1/account/sessions',{method:'DELETE'});location.reload()};
$('#reset').onclick=async()=>{try{await api('/api/v1/auth/reset',{method:'POST',body:JSON.stringify({token:$('#reset-code').value,newPassword:$('#password').value})});msg('Пароль изменён. Теперь войдите.')}catch(e){msg(e.message,true)}};
api('/api/v1/auth/me').then(d=>{csrf=d.csrfToken;show(d.user)}).catch(()=>{$('#auth').classList.remove('hidden')});
</script></body></html>
